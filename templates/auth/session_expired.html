{{define "content"}}
<main class="flex-1 grid place-items-center px-4">
  <div class="flex flex-col gap-4 items-center text-center fade-rise">
    <h1 class="text-3xl font-bold text-primary">Session expired</h1>
    <p class="text-sm opacity-70 max-w-xs">
      you've been signed out. Log in again to continue.
    </p>
    {{if .IsAdmin}}
    <a href="/auth/admin" class="btn btn-primary rounded-full px-6">Log in again</a>
    {{else}}
    <a href="/" class="btn btn-primary rounded-full px-6">Log in again</a>
    {{end}}
  </div>
</main>
{{end}}
