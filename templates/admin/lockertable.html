{{define "lockertable"}}
<script>
  document.addEventListener("htmx:afterRequest", function (event) {
    if (event.detail.xhr.status === 204) {
      const tr = event.target.closest("tr");
      if (tr) tr.remove();
    }
  });
</script>

<div class="overflow-x-auto rounded-box border border-base-300 max-h-[65vh] overflow-y-auto">
  <table class="table table-zebra table-pin-rows">
    <thead>
      <tr>
        <th><span class="sr-only">Row</span></th>
        <th>Locker</th>
        <th>Name</th>
        <th>Email</th>
        <th>Expires on</th>
        <th><span class="sr-only">Actions</span></th>
      </tr>
    </thead>

    <tbody>
      {{range $reg := .Registrations}}
      <tr>
        <th class="text-primary">{{$reg.RowIndex}}</th>
        <td class="font-medium">{{$reg.Locker}}</td>
        <td>{{$reg.Name}}</td>
        <td class="opacity-80">{{$reg.Email}}</td>
        <td class="whitespace-nowrap">{{$reg.Expiry}}</td>
        <td>
          <button
            class="btn btn-outline btn-error btn-xs"
            type="button"
            hx-delete="/admin/registration?locker={{$reg.Locker | urlquery}}"
            hx-confirm="Remove {{$reg.Name}}'s registration for {{$reg.Locker}}?"
          >
            remove
          </button>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{end}}
