<div class="flex flex-col items-center gap-6 w-full max-w-md mx-auto fade-rise">
  {{if .IsExpired}}
  <div role="alert" class="alert alert-error shadow-lg">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86l-8.48 14.7A1.5 1.5 0 003.1 21h17.8a1.5 1.5 0 001.29-2.44l-8.48-14.7a1.5 1.5 0 00-2.6 0z" />
    </svg>
    <span class="font-bold">Registration expired</span>
  </div>
  {{end}}

  <div class="hover-3d w-full">
    <div class="card border-2 bg-base-200 shadow-2xl {{if .IsExpired}}border-error/60{{else}}border-primary/30{{end}}">
      <div class="card-body items-center text-center gap-3 py-10">
        {{if .IsExpired}}
        <span class="badge badge-error gap-1 font-semibold">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86l-8.48 14.7A1.5 1.5 0 003.1 21h17.8a1.5 1.5 0 001.29-2.44l-8.48-14.7a1.5 1.5 0 00-2.6 0z" /></svg>
          Expired
        </span>
        {{else}}
        <span class="badge badge-primary font-semibold">Registered</span>
        {{end}}

        <svg class="h-12 w-12 {{if .IsExpired}}text-error{{else}}text-primary{{end}}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <rect x="4" y="3" width="16" height="18" rx="2" />
          <path stroke-linecap="round" d="M8 7h8" />
          <path stroke-linecap="round" d="M15 12.5v2.5" />
          <circle cx="15" cy="11.5" r="0.7" fill="currentColor" />
        </svg>

        <h1 class="text-5xl sm:text-6xl font-extrabold tracking-tight {{if .IsExpired}}text-error{{else}}text-primary{{end}}">
          {{.LockerName}}
        </h1>

        <span class="text-sm italic opacity-70">
          {{if .IsExpired}}Expired on {{.ExpireAt}}{{else}}Expires {{.ExpireAt}}{{end}}
        </span>
      </div>
    </div>
    <div></div><div></div><div></div>
    <div></div><div></div>
    <div></div><div></div><div></div>
  </div>

  <div class="flex flex-wrap items-center justify-center gap-3 w-full">
    {{if .IsExpired}}
    <form hx-post="/dash/renew" hx-target="#dashboard-content" hx-swap="innerHTML">
      <button type="submit" class="btn btn-primary rounded-full gap-2 px-6 shadow-lg shadow-primary/40 transition duration-200 hover:-translate-y-0.5 hover:shadow-xl active:translate-y-0">
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        Renew
      </button>
    </form>
    {{else}}
    <div class="tooltip" data-tip="You can renew once your locker has expired">
      <button type="button" class="btn btn-primary rounded-full gap-2 px-6" disabled>
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        Renew
      </button>
    </div>
    {{end}}

    <form hx-post="/dash/deregister" hx-target="#dashboard-content" hx-swap="innerHTML"
      hx-confirm="Deregister {{.LockerName}} ?">
      <button type="submit" class="btn btn-outline btn-error rounded-full gap-2 px-6 transition duration-200 hover:-translate-y-0.5 hover:shadow-lg active:translate-y-0">
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        Deregister
      </button>
    </form>
  </div>
</div>
