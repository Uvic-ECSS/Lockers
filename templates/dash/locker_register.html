{{define "content"}}
<main class="flex-1 grid place-items-center px-4 py-8">
  <section class="card border border-base-300 bg-base-200 shadow-lg w-full max-w-md fade-rise">
    <form
      hx-put="/dash/locker/register?locker={{.}}"
      class="card-body items-center gap-5"
      hx-disabled-elt="find button[type='submit'], find input[type='text']"
    >
      <div class="flex flex-col items-center gap-1">
        <span class="text-sm opacity-70">Registering for locker</span>
        <span class="text-primary text-4xl font-extrabold tracking-tight">{{.}}</span>
      </div>

      <input type="hidden" name="locker" value="{{.}}" />

      <label class="input flex items-center gap-2 w-full">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="h-4 w-4 opacity-70">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM12.735 14c.618 0 1.093-.561.872-1.139a6.002 6.002 0 0 0-11.215 0c-.22.578.254 1.139.872 1.139h9.47Z" />
        </svg>
        <input type="text" class="grow" name="name" placeholder="Your name" required />
      </label>

      <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>
  </section>
</main>
{{end}}
