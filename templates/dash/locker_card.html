{{if .LockerOK}}
<div class="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-[45vh] overflow-y-auto p-1 fade-rise">
  {{range $locker := .Lockers}}
  <div class="card border bg-base-100 {{if $locker.IsAvailable}}border-base-300{{else}}border-base-200 opacity-60{{end}}">
    <div class="card-body items-center gap-2 p-4">
      <p class="font-semibold">{{$locker.LockerID}}</p>

      {{if $locker.IsAvailable}}
      <a
        href="/dash/locker/register?locker={{$locker.LockerID}}"
        class="btn btn-primary btn-sm btn-block"
      >
        Register
      </a>
      {{else}}
      <span class="text-xs italic opacity-70">Taken</span>
      {{end}}
    </div>
  </div>
  {{end}}
</div>
{{else}}
<p class="text-center py-2 text-sm opacity-70">No locker matches that number.</p>
{{end}}
