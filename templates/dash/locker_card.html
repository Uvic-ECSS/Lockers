{{if .LockerOK}}
<div class="locker-grid grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-[45vh] overflow-y-auto p-1">
  {{range $locker := .Lockers}}
  <div class="locker-pop card border transition duration-200 {{if $locker.IsAvailable}}border-base-300 bg-base-100 hover:-translate-y-1 hover:border-primary hover:shadow-lg{{else}}border-base-200 bg-base-200/40 opacity-60{{end}}">
    <div class="card-body items-center gap-1.5 p-3">
      <svg class="h-5 w-5 {{if $locker.IsAvailable}}text-primary{{else}}text-base-content/40{{end}}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        {{if $locker.IsAvailable}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 1 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
        {{else}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
        {{end}}
      </svg>

      <p class="font-semibold text-sm">{{$locker.LockerID}}</p>

      {{if $locker.IsAvailable}}
      <a href="/dash/locker/register?locker={{$locker.LockerID}}" class="btn btn-primary btn-xs btn-block">Register</a>
      {{else}}
      <span class="text-xs italic opacity-70">Taken</span>
      {{end}}
    </div>
  </div>
  {{end}}
</div>
{{else}}
<p class="text-center py-2 text-sm opacity-70">No locker matches that number.</p>
{{end}}
